server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: tea-tracker

  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:tea_tracker}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:tea_user}
    password: ${MYSQL_PASSWORD:tea_password2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 60000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT_INTERNAL:6379}
      password: ${REDIS_PASSWORD:redis2024}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.tea.tracker: INFO
    org.springframework.data: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

tea:
  cache:
    template-ttl: 3600
